name: Deploy to Kaggle

on:
  push:
    branches:
      - main

jobs:
  deploy-kaggle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install -U kaggle

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          printf '%s' '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      # 🔥 Inject commit vào title
      - name: Inject commit into metadata title
        run: |
          COMMIT=${{ github.sha }}
          sed -i "s/hello-world-auto-deploy/hello-world-${COMMIT}/g" kaggle-notebook/kernel-metadata.json

      # 🚀 Push + truyền commit vào env
      - name: Push notebook to Kaggle
        env:
          GIT_COMMIT: ${{ github.sha }}
        run: kaggle kernels push -p kaggle-notebook