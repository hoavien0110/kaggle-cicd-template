name: Deploy to Kaggle

on:
  push:
    branches:
      - main

jobs:
  deploy-kaggle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install -U kaggle

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          printf '%s' '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      # 🔥 Inject commit vào notebook (QUAN TRỌNG)
      - name: Inject commit into notebook
        run: |
          COMMIT=${GITHUB_SHA::7}
          sed -i "s/__COMMIT__/$COMMIT/g" kaggle-notebook/hello_world.ipynb
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Push notebook to Kaggle
        run: kaggle kernels push -p kaggle-notebook